name: Weather Report

on:
  push:
    branches:
      - main
      - daily/cicd
    paths:
      - "apps/weather-report/**"
      - ".github/workflows/weather-report.yml"

  pull_request:
    branches:
      - main
      - daily/cicd
    paths:
      - "apps/weather-report/**"
      - ".github/workflows/weather-report.yml"

  repository_dispatch:
    types:
      - cron_trigger

  workflow_dispatch:


jobs:

  weather-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./apps/weather-report/.github/actions