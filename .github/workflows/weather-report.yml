name: Weather Report

on:
  push:
    branches: [main, daily/cicd]
    paths:
      - 'apps/weather-report/**'
      - '.github/workflows/weather-report.yml'
  pull_request:
    branches: [main, daily/cicd]
    paths:
      - 'apps/weather-report/**'
      - '.github/workflows/weather-report.yml'
  schedule:
    # 注意：schedule 只会在默认分支上的 workflow 文件生效。
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  weather-report-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps: &weather-report-steps
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run weather report CI
        uses: ./apps/weather-report/.github/actions

  weather-report-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps: *weather-report-steps

  weather-report-schedule:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Check out test branch
        uses: actions/checkout@v4
        with:
          ref: daily/cicd

      - name: Run weather report CI
        uses: ./apps/weather-report/.github/actions
