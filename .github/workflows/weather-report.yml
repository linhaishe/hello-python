name: Weather Report

on:
  push:
    branches:
      - main
      - daily/cicd
    paths:
      - "apps/weather-report/**"
      - ".github/workflows/weather-report.yml"

  pull_request:
    branches:
      - main
      - daily/cicd
    paths:
      - "apps/weather-report/**"
      - ".github/workflows/weather-report.yml"
  # 关键：允许外部通过 API 触发 repository_dispatch 事件
  repository_dispatch:
    types:
      - cron_trigger

  workflow_dispatch:

permissions:
  contents: write

jobs:

  weather-report:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./apps/weather-report/.github/actions